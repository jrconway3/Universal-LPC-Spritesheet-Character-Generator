<!DOCTYPE html>
<html lang="en-us" data-theme="light">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<title>Universal LPC Sprite Sheet Character Generator</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" integrity="sha384-DCY3M8xLkMu6c9IKcKbe+jHKMjelnwC0p+SBaxfHxoBYZWdJF2X400UdBCgATtAB" crossorigin="anonymous">
	<link rel="stylesheet" href="styles/loading.css">
	<link rel="stylesheet" href="styles/main.css">
	<link rel="stylesheet" href="styles/components/tree/recolors.css">
</head>
<body>
	<section id="header-left" class="sticky">
		<div class="is-flex is-align-items-center is-flex-wrap-wrap" style="gap: 1rem;">
			<h1 class="title is-4 mb-0">
				Universal LPC Spritesheet Generator
				<a href="https://github.com/liberatedpixelcup/Universal-LPC-Spritesheet-Character-Generator" class="ml-2">
					<img src="sources/github-mark.png" alt="View on GitHub" style="width:24px;height:24px;vertical-align:middle;">
				</a>
			</h1>
			<span class="subtitle is-6 mb-0 has-text-grey">
				Free/Libre pixel art from the <a href="https://lpc.opengameart.org">Liberated Pixel Cup</a>
				<span class="mx-2">|</span>
				You must <a href="#credits-section">credit the authors</a>
			</span>
			<span id="sponsors-links" class="subtitle is-6 mb-0">
				<a href="https://www.netlify.com/">Site previews by Netlify</a>
				<span class="mx-2">|</span>
				<a href="https://argos-ci.com?utm_source=LiberatedPixelCup&utm_campaign=oss">Visual testing by Argos</a>
			</span>
		</div>
	</section>

	<div id="columns-container" class="columns is-desktop">
		<div id="chooser-column" class="column">
			<div id="mithril-filters" class="loading"></div>
		</div>

		<div id="preview-column" class="column">
			<div id="mithril-preview" class="loading"></div>
			<div id="mithril-spritesheet-preview" class="loading"></div>
		</div>
	</div>
	<script type="module" src="sources/main.js"></script>
</body>
</html>
