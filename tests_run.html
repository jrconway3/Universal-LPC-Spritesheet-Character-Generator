     or vite from the repo root if you open this file outside Testem. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Test Runner - Universal LPC Sprite Sheet</title>
    <link rel="stylesheet" href="/node_modules/mocha/mocha.css" />

      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/sources/loading.css" />
    <link rel="stylesheet" href="/sources/main.css" />
    <!-- Prebuilt UMD bundle (not the package main); avoids Node `process` in Vite’s optimizer. -->
    <script src="/node_modules/mocha/mocha.js"></script>
    <script src="/testem.js"></script>
    <script>
      mocha.setup("bdd");
    </script>
  </head>
